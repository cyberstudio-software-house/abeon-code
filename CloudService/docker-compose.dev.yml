# Local dev stack for testing AbeonCloud pairing end-to-end without k8s.
# Brings up MariaDB + CloudService. Point the desktop's `cloudServiceUrl`
# setting at  http://localhost:8080  (Ustawienia → AbeonCloud).
#
# Run from this directory:
#   docker compose -f docker-compose.dev.yml up --build
#
# Generating a pairing code (/v1/devices + /v1/pair/start) only needs the DB —
# the default dev secret below is fine for that. For the desktop/phone to actually
# CONNECT to the production Centrifugo, the minted JWT must be signed with the SAME
# secret production uses; pass the real one (from the gitignored ../docs/centrifungo.md):
#   CENTRIFUGO_TOKEN_SECRET=$(grep CENTRIFUGO_TOKEN_SECRET ../docs/centrifungo.md | cut -d= -f2) \
#     docker compose -f docker-compose.dev.yml up --build
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: cloudservice
      MARIADB_USER: cloudservice
      MARIADB_PASSWORD: cloudservice
      MARIADB_ROOT_PASSWORD: rootpw
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  cloudservice:
    build:
      # The Dockerfile needs the repo root as context (path-dep on ../crates/abeon-remote-core).
      context: ..
      dockerfile: CloudService/Dockerfile
    environment:
      DATABASE_URL: mysql://cloudservice:cloudservice@db:3306/cloudservice
      # Real secret needed only for the JWT-mint / connect step; dev default is fine for pairing.
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET:-dev-secret-change-me}
      # Only used by /v1/command (publishing to Centrifugo) — unused for pairing/token.
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-local-dev-unused}
      CENTRIFUGO_API_URL: ${CENTRIFUGO_API_URL:-http://centrifugo-unused:8000}
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
