# CI for the AbeonCode monorepo.
#
# Builds the CloudService Docker image and pushes it to Docker Hub on every push to `main`
# that touches the service or the shared contract crate. The image is self-contained
# (multi-stage build → distroless runtime that runs the service); see CloudService/Dockerfile.
#
# Deployment variables (Repository settings → Deployments → Production), matching the
# bandzior-ksef convention:
#   DOCKERHUB_USERNAME  — Docker Hub user with push rights
#   DOCKERHUB_PASSWORD  — Docker Hub access token (Secured)
#   DOCKERHUB_NAMESPACE — e.g. cyberstudioinc
#   IMAGE_NAME          — e.g. abeoncode-cloudservice
#
# Deploy to k8s (namespace cs-app-cust1004-tools) is intentionally NOT part of this
# pipeline — it stops at pushing the image.

image: atlassian/default-image:3

definitions:
  services:
    docker:
      # The Rust release build runs inside the docker-in-docker daemon (default 1GB is too
      # little and OOMs). Lower this if builds prove lighter.
      memory: 6144

pipelines:
  branches:
    main:
      - step:
          name: Build and Push CloudService Image
          environment: Production
          size: 2x # Rust release build needs more CPU/RAM than the default 1x step.
          services:
            - docker
          condition:
            changesets:
              includePaths:
                # Monorepo: only build when the service or the shared contract crate changed.
                - "CloudService/**"
                - "crates/**"
          script:
            - VERSION="1.0.${BITBUCKET_BUILD_NUMBER}"
            - IMAGE="${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}"
            - echo "${DOCKERHUB_PASSWORD}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
            # Build context = repo root so the shared crates/ is in scope (see CloudService/Dockerfile).
            - docker build . --file CloudService/Dockerfile --tag "${IMAGE}:${VERSION}"
            - docker push "${IMAGE}:${VERSION}"
